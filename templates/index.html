<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>amber · Offers</title>
  <style>
    :root {
      --amber: #E1334E;        /* primary brand red */
      --amber-dark: #c41f3a;   /* hover */
      --amber-2: #D94B61;      /* muted red */
      --amber-soft: #E29AA7;   /* soft pink */
      --ink: #1a1a1a;
      --muted: #6b7280;
      --bg: #FEFDFD;           /* brand off-white */
      --card: #ffffff;
      --border: #f0d9de;       /* soft pink-tinted border */
      --ok: #1a7f37;
      --warn: #b45309;
      --err: #c1121f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.5;
    }
    header {
      background: var(--amber); border-bottom: none;
      padding: 18px 28px; display: flex; align-items: center; gap: 14px;
    }
    header .logo {
      color: #fff; font-weight: 800; font-size: 28px; letter-spacing: -0.5px;
      background: var(--amber); padding: 4px 16px; border-radius: 10px;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin: 0 0 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
    input[type=text], select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 9px; font-size: 14px; font-family: inherit; background: #fff;
    }
    textarea { min-height: 220px; resize: vertical; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .filebar { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
    button {
      background: var(--amber); color: #fff; border: none; border-radius: 9px;
      padding: 12px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: var(--amber-dark); }
    button.ghost { background: #fff; color: var(--ink); border: 1px solid var(--border); font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    #generateBtn { width: 100%; margin-top: 18px; padding: 14px; font-size: 15px; }

    .verdict { border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; font-size: 14px; }
    .verdict.ok { background: #e7f6ec; border: 1px solid #a6e3bb; color: var(--ok); }
    .verdict.no { background: #fdeaea; border: 1px solid #f2b8b8; color: var(--err); }
    .verdict.kam { background: #fff7e6; border: 1px solid #f5d68a; color: var(--warn); }
    .flags { margin-top: 8px; }
    .chip {
      display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.4px; padding: 3px 8px; border-radius: 999px;
      background: #f1f5f9; color: #334155; margin: 2px 4px 2px 0;
    }
    .offer { border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 18px; }
    .offer .props { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .field { margin-bottom: 14px; }
    .field .flabel { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
    .field .val { margin-top: 5px; white-space: pre-wrap; font-size: 14px; }
    .field .val.title { font-weight: 700; font-size: 16px; }
    .copybtn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 6px; }
    .copybtn:hover { background: #f1f5f9; color: var(--ink); }
    .len.ok { color: var(--ok); }
    .len.over_target { color: var(--warn); }
    .len.over_hard_cap { color: var(--err); }
    .missing { font-size: 12px; color: var(--warn); margin-top: 6px; }
    .review { background: #fff7e6; border: 1px solid #f5d68a; color: var(--warn); border-radius: 8px; padding: 10px 12px; margin-top: 10px; font-size: 13px; }
    .review strong { display: block; margin-bottom: 4px; }
    .review ul { margin: 0; padding-left: 18px; }
    .feedback { border-top: 1px solid var(--border); margin-top: 18px; padding-top: 16px; }
    .feedback .stars { font-size: 26px; color: var(--amber); cursor: pointer; margin: 4px 0 10px; user-select: none; }
    .feedback .star { padding: 0 2px; }
    .feedback textarea { min-height: 70px; }
    .feedback #fbSubmit { margin-top: 8px; }
    .feedback #fbMsg { margin-left: 10px; }
    .terms { padding-left: 0; list-style: none; margin: 6px 0 0; }
    .terms li { font-size: 13px; margin-bottom: 5px; }
    .placeholder { color: var(--muted); font-size: 14px; text-align: center; padding: 40px 10px; }
    .error { background: #fdeaea; border: 1px solid #f2b8b8; color: var(--err); padding: 12px 14px; border-radius: 10px; font-size: 14px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -3px; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <span class="logo">amber</span>
  </header>

  <div class="wrap">
    <div class="grid">
      <!-- INPUT -->
      <div class="card">
        <h2>Input</h2>
        <div class="row">
          <div>
            <label for="country">Country</label>
            <select id="country"></select>
          </div>
          <div>
            <label for="property">Property name(s)</label>
            <input type="text" id="property" placeholder="e.g. Radford Mill, Nottingham" />
          </div>
        </div>

        <label for="offer">Raw offer text</label>
        <textarea id="offer" placeholder="Paste the offer exactly as it appears in the Freshdesk ticket / property email / website banner…"></textarea>

        <label for="tnc">Terms &amp; Conditions <span style="font-weight:400;color:var(--muted)">(optional, paste separately if you have them)</span></label>
        <textarea id="tnc" style="min-height:120px" placeholder="Paste the offer's Terms &amp; Conditions here if they are separate. Leave blank if the T&Cs are already inside the offer text above (or if none were provided)."></textarea>

        <div class="filebar">
          <input type="file" id="pdf" accept=".pdf,.png,.jpg,.jpeg,.webp,application/pdf,image/*" />
          <span id="fileStatus" class="hint"></span>
        </div>
        <div class="hint">Or upload a PDF / screenshot / image of the offer and click Generate, it is sent straight to the AI. (Use either the text boxes above or a file, not both.)</div>

        <button id="generateBtn" type="button">Generate offer content</button>
      </div>

      <!-- OUTPUT -->
      <div class="card">
        <h2>Output</h2>
        <div id="output">
          <div class="placeholder">Generated Title, Body and T&amp;Cs will appear here.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // Country list — primary amber markets pinned first, then all countries A–Z.
    const PRIMARY = ["United Kingdom", "United States", "Australia", "Canada", "Ireland", "Singapore", "Germany", "Spain", "Netherlands"];
    const ALL_COUNTRIES = [
      "Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria","Azerbaijan",
      "Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia",
      "Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cambodia","Cameroon","Canada",
      "Cape Verde","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia",
      "Cuba","Cyprus","Czechia","Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador",
      "Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia",
      "Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti",
      "Honduras","Hong Kong","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel",
      "Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Kosovo","Kuwait","Kyrgyzstan",
      "Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar",
      "Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia",
      "Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nauru","Nepal",
      "Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan",
      "Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar",
      "Romania","Russia","Rwanda","Saint Kitts and Nevis","Saint Lucia","Saint Vincent and the Grenadines","Samoa","San Marino","Sao Tome and Principe","Saudi Arabia",
      "Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa",
      "South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan",
      "Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan",
      "Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu","Vatican City",
      "Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"
    ];
    (function populateCountries() {
      const sel = $("country");
      sel.innerHTML = '<option value="">Select…</option>';

      const primaryGroup = document.createElement("optgroup");
      primaryGroup.label = "Primary markets";
      PRIMARY.forEach((c) => primaryGroup.appendChild(new Option(c, c)));
      sel.appendChild(primaryGroup);

      const allGroup = document.createElement("optgroup");
      allGroup.label = "All countries";
      ALL_COUNTRIES.forEach((c) => allGroup.appendChild(new Option(c, c)));
      sel.appendChild(allGroup);
    })();

    // Show the chosen file name (the file is sent straight to the AI on Generate).
    $("pdf").addEventListener("change", () => {
      const f = $("pdf").files[0];
      $("fileStatus").textContent = f ? ("Selected: " + f.name + " — click Generate") : "";
    });

    $("generateBtn").addEventListener("click", async () => {
      const file = $("pdf").files[0];
      const raw_offer = $("offer").value.trim();
      if (!file && !raw_offer) {
        alert("Paste the offer text or upload a PDF/image first.");
        return;
      }
      const out = $("output");
      const btn = $("generateBtn");
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Generating…';
      out.innerHTML = '<div class="placeholder">Working…</div>';
      try {
        let res;
        if (file) {
          // Send the file straight to the model (no separate extraction step).
          const fd = new FormData();
          fd.append("file", file);
          fd.append("country", $("country").value);
          fd.append("property_name", $("property").value);
          res = await fetch("/generate", { method: "POST", body: fd });
        } else {
          res = await fetch("/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              raw_offer,
              raw_tnc: $("tnc").value,
              country: $("country").value,
              property_name: $("property").value,
            }),
          });
        }
        const data = await res.json();
        if (data.error) { out.innerHTML = `<div class="error">${escapeHtml(data.error)}</div>`; }
        else { renderResult(data, out); }
      } catch (e) {
        out.innerHTML = `<div class="error">Request failed: ${escapeHtml(String(e))}</div>`;
      } finally {
        btn.disabled = false; btn.textContent = "Generate offer content";
      }
    });

    function renderResult(data, out) {
      let html = "";
      // Verdict banner
      let cls = data.applicable ? (data.needs_kam_confirmation ? "kam" : "ok") : "no";
      let label = data.applicable
        ? (data.needs_kam_confirmation ? "⚠ Applicable — needs KAM confirmation" : "✓ Applicable")
        : "✗ Not applicable to Amber";
      html += `<div class="verdict ${cls}"><strong>${label}</strong><br>${escapeHtml(data.assessment || "")}`;
      const flags = (data.flags || []).filter((f) => f && f !== "none");
      if (flags.length) {
        html += `<div class="flags">` + flags.map((f) => `<span class="chip">${escapeHtml(f)}</span>`).join("") + `</div>`;
      }
      html += `</div>`;

      // Global (non-offer) SOP warnings the auto-cleaner could not fully fix.
      const warnings = data.warnings || [];
      const globalWarnings = warnings.filter((w) => w.offer_index === null || w.offer_index === undefined);
      if (globalWarnings.length) {
        html += reviewBlock(globalWarnings);
      }

      const offers = data.offers || [];
      window.__lastOffers = offers;
      if (!offers.length) {
        html += `<div class="placeholder">No offer content generated (see the verdict above).</div>`;
      } else {
      offers.forEach((o, idx) => {
        html += `<div class="offer">`;
        if (o.properties && o.properties.length) {
          html += `<div class="props">📍 ${escapeHtml(o.properties.join(" · "))}</div>`;
        }
        // Title
        const lenCls = o.title_status || "ok";
        html += field("Offer Title", `<span class="val title">${escapeHtml(o.title || "")}</span>`,
          o.title || "", `<span class="len ${lenCls}">${o.title_length || 0} chars</span>`);
        // Body
        html += field("Offer Body", `<span class="val">${escapeHtml(o.body || "")}</span>`, o.body || "");
        // Terms
        const terms = o.terms || [];
        const termsText = terms.join("\n");
        const termsHtml = `<ul class="terms">` + terms.map((t) => `<li>${escapeHtml(t)}</li>`).join("") + `</ul>`;
        html += field("Terms & Conditions", termsHtml, termsText);
        // Missing info
        if (o.missing_info && o.missing_info.length) {
          html += `<div class="missing">⚠ Missing from source: ${escapeHtml(o.missing_info.join("; "))}</div>`;
        }
        // SOP warnings scoped to this offer
        const ws = warnings.filter((w) => w.offer_index === idx);
        if (ws.length) {
          html += reviewBlock(ws);
        }
        html += `</div>`;
      });
      }

      // Feedback widget — always shown so the user can rate/comment every result.
      html += `<div class="feedback" data-run="${data.run_id || ''}">
        <div class="flabel"><span>Rate this result</span></div>
        <div class="stars" id="stars">${[1,2,3,4,5].map((n)=>`<span class="star" data-v="${n}">☆</span>`).join("")}</div>
        <textarea id="fbComment" placeholder="Optional: a comment or suggestion on this result"></textarea>
        <button class="ghost" id="fbSubmit" type="button">Submit feedback</button>
        <span id="fbMsg" class="hint"></span>
      </div>`;

      out.innerHTML = html;
      attachCopyHandlers();
      attachFeedbackHandlers();
    }

    let _rating = 0;
    function attachFeedbackHandlers() {
      const wrap = document.querySelector(".feedback");
      if (!wrap) return;
      _rating = 0;
      const runId = wrap.dataset.run;
      const stars = wrap.querySelectorAll(".star");
      stars.forEach((s) => s.addEventListener("click", () => {
        _rating = parseInt(s.dataset.v, 10);
        stars.forEach((x) => x.textContent = parseInt(x.dataset.v, 10) <= _rating ? "★" : "☆");
      }));
      wrap.querySelector("#fbSubmit").addEventListener("click", async () => {
        const comment = wrap.querySelector("#fbComment").value.trim();
        const msg = wrap.querySelector("#fbMsg");
        if (!_rating && !comment) { msg.textContent = "Pick a rating or write a comment first."; return; }
        msg.textContent = "Saving…";
        try {
          const res = await fetch("/feedback", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              run_id: runId || null,
              rating: _rating || null,
              comment,
              context: {
                country: $("country").value,
                property_name: $("property").value,
                raw_offer: $("offer").value,
                raw_tnc: $("tnc").value,
                offers: window.__lastOffers || [],
              },
            }),
          });
          const data = await res.json();
          msg.textContent = data.ok ? "Thanks! Feedback saved." : ("Could not save: " + (data.error || ""));
        } catch (e) { msg.textContent = "Could not save feedback."; }
      });
    }

    function reviewBlock(warnings) {
      return `<div class="review"><strong>⚠ Review before publishing</strong><ul>` +
        warnings.map((w) => `<li>${escapeHtml(w.message)}</li>`).join("") + `</ul></div>`;
    }

    function field(labelText, innerHtml, copyText, extraRight) {
      const id = "c" + Math.random().toString(36).slice(2);
      window.__copy = window.__copy || {};
      window.__copy[id] = copyText;
      return `<div class="field">
        <div class="flabel"><span>${labelText} ${extraRight || ""}</span>
        <button class="copybtn" data-copy="${id}">Copy</button></div>
        <div class="val">${innerHtml}</div></div>`;
    }

    function attachCopyHandlers() {
      document.querySelectorAll(".copybtn").forEach((b) => {
        b.addEventListener("click", () => {
          const txt = window.__copy[b.dataset.copy] || "";
          navigator.clipboard.writeText(txt);
          const orig = b.textContent; b.textContent = "Copied!";
          setTimeout(() => (b.textContent = orig), 1200);
        });
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
  </script>
</body>
</html>
