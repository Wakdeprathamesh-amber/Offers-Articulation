# Render Blueprint for the amber Offer Content Automation app.
# In the Render dashboard: New + > Blueprint, point it at this repo.
services:
  - type: web
    name: amber-offer-automation
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # --timeout 120: gunicorn's default worker timeout is 30s, which would kill a
    # slow gpt-5.5 generation. Keep it above OPENAI_TIMEOUT (60s).
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set this securely in the Render dashboard, never in code
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_TIMEOUT
        value: "60"          # gpt-5.5 is slower than gpt-4o; give requests headroom
      - key: PYTHON_VERSION
        value: 3.12.6
      # Run-logging via Google Sheets (reachable from Render). Set both securely in
      # the Render dashboard. If unset, run-logging is simply disabled (generation
      # still works). GOOGLE_SHEETS_CREDENTIALS_JSON = the whole service-account
      # JSON pasted as the value; share the sheet with the service-account email.
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS_JSON
        sync: false
      # NOTE: PostgreSQL (WAKDE_DB_*) is intentionally NOT used here, the staging DB
      # host is a private IP unreachable from Render. The app supports it for
      # inside-network deploys; set those vars only in such an environment.
